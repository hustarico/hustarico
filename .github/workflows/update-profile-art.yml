name: Update profile art

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4

      - name: Scrape contributions
        run: python scripts/fetch_contributions.py
        env:
          GH_PROFILE_USER: hustarico

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit & push
        run: |
          git config user.name "hustarico"
          git config user.email "hussamtarteer74@gmail.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --cached --quiet || git commit -m "daily contribution graph update"
          git pull --rebase
          git push
